<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chipeur arrête de Shipper</title>

  <!-- Liens pour l'icône de l'application et le manifest -->
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      --primary: #ea580c;
      --primary-hover: #c2410c;
      --secondary: #1e293b;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --border: #cbd5e1;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* --- ACCUEIL --- */
    #home-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      text-align: center;
      background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
    }

    .logo-container {
      width: 180px;
      height: 180px;
      margin-bottom: 1.5rem;
      background: white;
      border-radius: 50%;
      padding: 10px;
      box-shadow: 0 10px 25px -5px rgba(234, 88, 12, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .app-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 0.5rem;
      line-height: 1.25;
      padding: 0 0.5rem;
    }

    .app-subtitle {
      font-size: 1.05rem;
      color: #64748b;
      max-width: 400px;
      margin-bottom: 2rem;
    }

    .btn-start {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 30px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(234, 88, 12, 0.4);
      transition: all 0.2s ease;
    }

    /* --- APPLICATION --- */
    #app-screen {
      display: none;
      max-width: 800px;
      margin: 0 auto;
      padding: 1rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
      gap: 0.5rem;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
    }

    .header-brand img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .header-brand h1 {
      font-size: 1.05rem;
      color: var(--primary);
      line-height: 1.2;
    }

    .btn-nav-home {
      background: transparent;
      border: 1px solid var(--border);
      color: #64748b;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      flex-shrink: 0;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    /* BARRE DE RECHERCHE ET BOUTON */
    .search-box {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .search-box input {
      flex: 1;
    }

    .btn-search {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s ease;
    }

    .btn-search:hover {
      background-color: var(--primary-hover);
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    input, textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
    }

    #photoPreview {
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      border-radius: 8px;
      display: none;
      margin-bottom: 0.75rem;
      border: 1px solid var(--border);
    }

    .camera-controls {
      display: flex;
      gap: 0.5rem;
    }

    button.btn-main {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
    }

    button.btn-secondary {
      background-color: #64748b;
      color: white;
      border: none;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }

    /* FILTRE PAR DATE ET BOUTONS PDF / VIDER */
    .export-filter-container {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.75rem;
      background: #f1f5f9;
      padding: 0.75rem;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .export-filter-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--secondary);
    }

    .export-actions-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .input-date-custom {
      flex: 1;
      min-width: 140px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      background: white;
    }

    button.btn-pdf {
      background-color: #0284c7;
      color: white;
      border: none;
      padding: 0.6rem 0.85rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      white-space: nowrap;
    }

    button.btn-pdf:hover {
      background-color: #0369a1;
    }

    button.btn-danger {
      background-color: #ef4444;
      color: white;
      border: none;
      padding: 0.6rem 0.85rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .section-header {
      margin-bottom: 0.5rem;
    }

    /* --- LISTE COMPACTE D'HISTORIQUE --- */
    .liste-commandes {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .commande-item-compact {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .commande-item-compact:hover {
      background: #f1f5f9;
    }

    .commande-main-btn {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-grow: 1;
    }

    .commande-num-badge {
      font-weight: bold;
      font-size: 1.05rem;
      color: var(--primary);
    }

    .commande-date-compact {
      font-size: 0.75rem;
      color: #64748b;
    }

    .commande-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-edit-small {
      background: #ffffff;
      border: 1px solid var(--border);
      color: var(--secondary);
      padding: 0.35rem 0.6rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-edit-small:hover {
      background: var(--border);
    }

    .btn-delete-small {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #ef4444;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-delete-small:hover {
      background: #fee2e2;
    }

    /* --- MODAL ZOOM IMAGE --- */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      align-items: center;
      justify-content: center;
      padding: 1rem;
      flex-direction: column;
    }

    .modal-content-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 95%;
      max-height: 90vh;
    }

    .modal img {
      max-width: 100%;
      max-height: 70vh;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      object-fit: contain;
    }

    .modal-notes {
      color: white;
      background: rgba(15, 23, 42, 0.8);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-top: 1rem;
      max-width: 500px;
      text-align: center;
      font-size: 0.95rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 25px;
      color: white;
      font-size: 2rem;
      font-weight: bold;
      cursor: pointer;
      z-index: 1001;
    }

    /* --- STYLES D'IMPRESSION (GENERATION PDF) --- */
    @media print {
      body * {
        visibility: hidden;
      }
      #print-area, #print-area * {
        visibility: visible;
      }
      #print-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        padding: 20px;
      }
      .print-title {
        font-size: 22px;
        color: #ea580c;
        margin-bottom: 5px;
        font-weight: bold;
      }
      .print-subtitle {
        font-size: 12px;
        color: #64748b;
        margin-bottom: 20px;
        border-bottom: 2px solid #ea580c;
        padding-bottom: 10px;
      }
      .print-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }
      .print-card {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 10px;
        page-break-inside: avoid;
        background: #ffffff;
      }
      .print-card h3 {
        font-size: 16px;
        color: #0f172a;
        margin-bottom: 4px;
      }
      .print-card .date {
        font-size: 11px;
        color: #64748b;
        margin-bottom: 8px;
      }
      .print-card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid #e2e8f0;
      }
      .print-card .notes {
        font-size: 12px;
        color: #334155;
        margin-top: 6px;
        font-style: italic;
      }
    }
  </style>
</head>
<body>

  <!-- ACCUEIL -->
  <div id="home-screen">
    <div class="logo-container">
      <img src="logo.png" alt="Chipeur Logo">
    </div>
    <h1 class="app-title">Chipeur, arrête de Shipper&nbsp;!</h1>
    <p class="app-subtitle">Prenez en photo vos préparations de commandes et gardez une preuve visuelle incontestable.</p>
    <button class="btn-start" id="btnCommencer">🚀 Lancer les préparations</button>
  </div>

  <!-- APPLICATION -->
  <div id="app-screen">
    <header>
      <div class="header-brand">
        <img src="logo.png" alt="Logo">
        <h1>Chipeur, arrête de Shipper&nbsp;!</h1>
      </div>
      <button class="btn-nav-home" id="btnRetourAccueil">🏠 Accueil</button>
    </header>

    <!-- SECTION RECHERCHE AVEC BOUTON -->
    <section class="card" style="padding: 1rem;">
      <div class="search-box">
        <input type="text" id="recherche" placeholder="🔍 Rechercher par numéro..." autocomplete="off">
        <button type="button" class="btn-search" id="btnLancerRecherche">Rechercher</button>
      </div>
    </section>

    <!-- NOUVELLE PREPARATION -->
    <section class="card" id="sectionPreparation">
      <h2 id="formTitle" style="font-size: 1.1rem; margin-bottom:1rem; color:var(--primary);">Nouvelle Préparation</h2>
      <div class="form-group">
        <label for="numeroCommande">Numéro de Commande</label>
        <input type="text" id="numeroCommande" name="no_autofill_cmd" autocomplete="off">
      </div>

      <div class="form-group">
        <label>Photo du colis / préparation</label>
        <img id="photoPreview" alt="Aperçu photo">
        
        <!-- Input pour Galerie -->
        <input type="file" id="fileGallery" accept="image/*" style="display: none;">
        <!-- Input pour Appareil Photo -->
        <input type="file" id="fileCamera" accept="image/*" capture="environment" style="display: none;">
        
        <div class="camera-controls">
          <button type="button" class="btn-secondary" id="btnGalerie">📁 Galerie</button>
          <button type="button" class="btn-secondary" id="btnPhotoDirecte">📸 Photo</button>
        </div>
      </div>

      <div class="form-group">
        <label for="notes">Remarques (optionnel)</label>
        <textarea id="notes" rows="2" placeholder="Ex: Produit fragile, carton réutilisé..." autocomplete="off"></textarea>
      </div>

      <div style="display:flex; gap:0.5rem;">
        <button class="btn-main" id="btnEnregistrer">Enregistrer la préparation</button>
        <button class="btn-secondary" id="btnAnnulerEdit" style="display:none; width:auto;">Annuler</button>
      </div>
    </section>

    <!-- HISTORIQUE DES PREUVES -->
    <section class="card">
      <div class="section-header">
        <h2>Historique des Preuves</h2>
      </div>

      <div class="export-filter-container">
        <span class="export-filter-label">📅 Filtrer par date pour l'export (Optionnel) :</span>
        <div class="export-actions-row">
          <input type="date" id="dateFiltreExport" class="input-date-custom">
          <button class="btn-pdf" id="btnExportPDF">📄 Exporter PDF</button>
          <button class="btn-danger" id="btnViderHistorique">🗑️ Vider</button>
        </div>
      </div>

      <div class="liste-commandes" id="galerieCommandes"></div>
    </section>
  </div>

  <!-- ZONE INVISIBLE DÉDIÉE À L'IMPRESSION PDF -->
  <div id="print-area"></div>

  <!-- MODAL ZOOM PHOTO & COMMENTAIRE -->
  <div id="imageModal" class="modal">
    <span class="modal-close" id="closeModal">&times;</span>
    <div class="modal-content-container">
      <img id="modalImg" src="" alt="Zoom photo">
      <div id="modalNotes" class="modal-notes" style="display: none;"></div>
    </div>
  </div>

  <script>
    const homeScreen = document.getElementById('home-screen');
    const appScreen = document.getElementById('app-screen');
    const btnCommencer = document.getElementById('btnCommencer');
    const btnRetourAccueil = document.getElementById('btnRetourAccueil');
    const sectionPreparation = document.getElementById('sectionPreparation');

    btnCommencer.addEventListener('click', () => {
      homeScreen.style.display = 'none';
      appScreen.style.display = 'block';
      document.getElementById('numeroCommande').value = "";
    });

    btnRetourAccueil.addEventListener('click', () => {
      reinitialiserFormulaire();
      inputRecherche.value = "";
      sectionPreparation.style.display = 'block';
      afficherGalerie();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    let commandes = JSON.parse(localStorage.getItem('commandes_prepa')) || [];
    let imageCaptureeData = "";
    let modeEditionId = null;

    const inputNumero = document.getElementById('numeroCommande');
    const inputNotes = document.getElementById('notes');
    const photoPreview = document.getElementById('photoPreview');
    
    const fileGallery = document.getElementById('fileGallery');
    const fileCamera = document.getElementById('fileCamera');
    
    const btnGalerie = document.getElementById('btnGalerie');
    const btnPhotoDirecte = document.getElementById('btnPhotoDirecte');
    
    const btnEnregistrer = document.getElementById('btnEnregistrer');
    const btnAnnulerEdit = document.getElementById('btnAnnulerEdit');
    const formTitle = document.getElementById('formTitle');
    const galerieCommandes = document.getElementById('galerieCommandes');
    const inputRecherche = document.getElementById('recherche');
    const btnLancerRecherche = document.getElementById('btnLancerRecherche');
    const btnViderHistorique = document.getElementById('btnViderHistorique');
    const btnExportPDF = document.getElementById('btnExportPDF');
    const dateFiltreExport = document.getElementById('dateFiltreExport');

    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImg');
    const modalNotes = document.getElementById('modalNotes');
    const closeModal = document.getElementById('closeModal');

    window.addEventListener('DOMContentLoaded', () => {
      inputNumero.value = "";
      afficherGalerie();
    });

    function compresserImage(dataUrl, callback) {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        const maxDimension = 600;

        if (width > height && width > maxDimension) {
          height *= maxDimension / width;
          width = maxDimension;
        } else if (height > maxDimension) {
          width *= maxDimension / height;
          height = maxDimension;
        }

        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        callback(canvas.toDataURL('image/jpeg', 0.5));
      };
      img.src = dataUrl;
    }

    btnGalerie.addEventListener('click', () => fileGallery.click());
    btnPhotoDirecte.addEventListener('click', () => fileCamera.click());

    function chargerFichier(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          compresserImage(event.target.result, (imageCompressée) => {
            imageCaptureeData = imageCompressée;
            photoPreview.src = imageCaptureeData;
            photoPreview.style.display = 'block';
          });
        };
        reader.readAsDataURL(file);
      }
    }

    fileGallery.addEventListener('change', chargerFichier);
    fileCamera.addEventListener('change', chargerFichier);

    btnEnregistrer.addEventListener('click', () => {
      const numero = inputNumero.value.trim();
      const notes = inputNotes.value.trim();

      if (!numero || !imageCaptureeData) {
        alert("Veuillez renseigner un numéro et ajouter une photo.");
        return;
      }

      if (modeEditionId !== null) {
        const index = commandes.findIndex(c => c.id === modeEditionId);
        if (index !== -1) {
          commandes[index].numero = numero;
          commandes[index].notes = notes;
          commandes[index].photo = imageCaptureeData;
        }
      } else {
        commandes.unshift({
          id: Date.now(),
          numero: numero,
          photo: imageCaptureeData,
          notes: notes,
          date: new Date().toLocaleString('fr-FR')
        });
      }

      try {
        localStorage.setItem('commandes_prepa', JSON.stringify(commandes));
      } catch (e) {
        alert("Mémoire saturée ! Videz l'historique pour ajouter de nouvelles photos.");
        return;
      }

      reinitialiserFormulaire();
      afficherGalerie();
    });

    function reinitialiserFormulaire() {
      modeEditionId = null;
      inputNumero.value = "";
      imageCaptureeData = "";
      photoPreview.style.display = 'none';
      inputNotes.value = "";
      fileGallery.value = "";
      fileCamera.value = "";
      btnEnregistrer.textContent = "Enregistrer la préparation";
      btnAnnulerEdit.style.display = "none";
      formTitle.textContent = "Nouvelle Préparation";
    }

    btnAnnulerEdit.addEventListener('click', reinitialiserFormulaire);

    window.editerCommande = function(id, event) {
      if (event) event.stopPropagation();
      const item = commandes.find(c => c.id === id);
      if (!item) return;

      inputRecherche.value = "";
      sectionPreparation.style.display = 'block';

      modeEditionId = id;
      inputNumero.value = item.numero;
      inputNotes.value = item.notes || "";
      imageCaptureeData = item.photo;
      
      photoPreview.src = item.photo;
      photoPreview.style.display = 'block';

      btnEnregistrer.textContent = "💾 Sauvegarder les modifications";
      btnAnnulerEdit.style.display = "inline-block";
      formTitle.textContent = "✏️ Modifier la commande " + item.numero;
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.supprimerCommande = function(id, event) {
      if (event) event.stopPropagation();
      const item = commandes.find(c => c.id === id);
      if (!item) return;

      if (confirm(`Voulez-vous vraiment supprimer la commande ${item.numero} ?`)) {
        commandes = commandes.filter(c => c.id !== id);
        localStorage.setItem('commandes_prepa', JSON.stringify(commandes));
        if (modeEditionId === id) reinitialiserFormulaire();
        afficherGalerie(inputRecherche.value);
      }
    };

    btnViderHistorique.addEventListener('click', () => {
      if (confirm("Voulez-vous vraiment effacer tout l'historique des photos ?")) {
        commandes = [];
        localStorage.removeItem('commandes_prepa');
        reinitialiserFormulaire();
        afficherGalerie();
      }
    });

    function afficherGalerie(filtre = "") {
      galerieCommandes.innerHTML = "";
      const liste = commandes.filter(c => c.numero.toLowerCase().includes(filtre.toLowerCase()));

      if (liste.length === 0) {
        galerieCommandes.innerHTML = `<p style="text-align:center; color:#64748b; padding:1rem;">Aucune commande trouvée.</p>`;
        return;
      }

      liste.forEach(cmd => {
        const item = document.createElement('div');
        item.className = 'commande-item-compact';
        item.onclick = () => ouvrirModal(cmd.photo, cmd.notes);
        item.innerHTML = `
          <div class="commande-main-btn">
            <span>📷</span>
            <div>
              <div class="commande-num-badge">${cmd.numero}</div>
              <div class="commande-date-compact">${cmd.date}</div>
            </div>
          </div>
          <div class="commande-actions">
            <button class="btn-edit-small" onclick="editerCommande(${cmd.id}, event)">✏️ Modifier</button>
            <button class="btn-delete-small" onclick="supprimerCommande(${cmd.id}, event)">❌</button>
          </div>
        `;
        galerieCommandes.appendChild(item);
      });
    }

    window.ouvrirModal = function(src, notes) {
      modal.style.display = "flex";
      modalImg.src = src;
      if (notes && notes.trim() !== "") {
        modalNotes.textContent = "💬 " + notes;
        modalNotes.style.display = "block";
      } else {
        modalNotes.style.display = "none";
      }
    };

    closeModal.addEventListener('click', () => modal.style.display = "none");
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.style.display = "none";
    });

    // FONCTION DE RECHERCHE
    function executerRecherche() {
      const valeur = inputRecherche.value.trim();
      if (valeur !== "") {
        sectionPreparation.style.display = 'none';
      } else {
        sectionPreparation.style.display = 'block';
      }
      afficherGalerie(valeur);
    }

    btnLancerRecherche.addEventListener('click', executerRecherche);
    inputRecherche.addEventListener('input', executerRecherche);
    inputRecherche.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') executerRecherche();
    });

    // --- FONCTION EXPORT EN PDF AVEC FILTRE DE DATE ---
    btnExportPDF.addEventListener('click', () => {
      const dateSelect = dateFiltreExport.value;
      let listeAExporter = commandes;
      let titreExport = "Historique Complet des Preuves";

      if (dateSelect) {
        // Formater YYYY-MM-DD en DD/MM/YYYY
        const parts = dateSelect.split('-');
        const dateFormatee = `${parts[2]}/${parts[1]}/${parts[0]}`;
        
        // Filtrer les commandes dont la date commence par la date choisie
        listeAExporter = commandes.filter(cmd => cmd.date.startsWith(dateFormatee));
        titreExport = `Historique des Preuves - Date : ${dateFormatee}`;

        if (listeAExporter.length === 0) {
          alert(`Aucune commande trouvée pour la date du ${dateFormatee}.`);
          return;
        }
      } else {
        if (commandes.length === 0) {
          alert("L'historique est vide, aucun document à exporter.");
          return;
        }
      }

      const printArea = document.getElementById('print-area');
      const dateHeureExport = new Date().toLocaleString('fr-FR');

      // Construction du document HTML d'impression
      let html = `
        <div class="print-title">${titreExport}</div>
        <div class="print-subtitle">Document généré le ${dateHeureExport} - Total : ${listeAExporter.length} preuve(s)</div>
        <div class="print-grid">
      `;

      listeAExporter.forEach(cmd => {
        html += `
          <div class="print-card">
            <h3>Commande : ${cmd.numero}</h3>
            <div class="date">Date : ${cmd.date}</div>
            <img src="${cmd.photo}" alt="Preuve commande ${cmd.numero}">
            ${cmd.notes ? `<div class="notes">💬 ${cmd.notes}</div>` : ''}
          </div>
        `;
      });

      html += `</div>`;
      printArea.innerHTML = html;

      // Déclenchement de l'impression native
      window.print();
    });
  </script>
</body>
</html>
