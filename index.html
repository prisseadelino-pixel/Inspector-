<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chipeur, arrête de Shipper !</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            color: #38bdf8;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
        }
        .upload-container {
            background-color: #1e293b;
            border: 2px dashed #334155;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn:active {
            background-color: #0ea5e9;
        }
        #fileInput {
            display: none;
        }
        #preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <h1>Chipeur, arrête de Shipper !</h1>

    <div class="upload-container">
        <p>Sélectionnez une option :</p>
        
        <!-- Bouton pour choisir depuis la galerie ou les fichiers -->
        <button class="btn" onclick="document.getElementById('fileInput').click()">📁 Choisir depuis la galerie</button>
        <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">

        <!-- Bouton pour prendre une photo directement -->
        <button class="btn" onclick="document.getElementById('cameraInput').click()" style="background-color: #10b981; color: white;">📸 Prendre une photo</button>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="previewImage(event)">

        <br>
        <img id="preview" alt="Aperçu de l'image">
    </div>

    <script>
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function(){
                const output = document.getElementById('preview');
                output.src = reader.result;
                output.style.display = 'block';
            };
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>

</body>
</html>
